<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RettVest</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- INFO: Splide JS Styles -->
  <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css"
  />

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="/assets/favicon/site.webmanifest">
  <link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#3c3c3c">
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-config" content="/assets/favicon/browserconfig.xml">
  <meta name="theme-color" content="#66CC8A">
</head>
<body data-theme="rettvest">
  <form name="kontakt" method="POST" action="/takk-for-henvendelsen" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="kontakt">
    <input name="bot-field">
    <input type="text" name="navn">
    <input type="email" name="epost">
    <input type="tel" name="telefon">
    <select name="henvendelse_type">
      <option value="Hjemmekennel">Hjemmekennel</option>
      <option value="Omplassering">Omplassering</option>
      <option value="Annet">Annet</option>
    </select>
    <input type="text" name="hundens_navn">
    <input type="text" name="onsket_periode">
    <textarea name="melding"></textarea>
  </form>
  <app-root></app-root>
</body>
</html>
