<header class="fixed inset-x-0 top-0 z-[90] navbar bg-base-100/95 backdrop-blur border-b border-base-300 shadow-sm">
  <div class="navbar-start">
    <a
      routerLink="/"
      class="text-xl flex flex-col cursor-pointer leading-tight"
    >
      <span class="font-bold text-neutral">RettVest</span>
      <small class="text-sm text-primary">
        Hjemmekennel & Pensjonat
      </small>
    </a>
  </div>
  <div class="navbar-end hidden xl:flex">
    <ul class="menu menu-horizontal px-1 gap-1">
      <li
        *ngFor="let menuItem of menuItems"
      >
        <a
          [routerLink]="menuItem.href"
          routerLinkActive="bg-base-200 text-primary"
          [routerLinkActiveOptions]="{ exact: menuItem.href === '/' }"
          class="font-medium rounded-md"
        >
          {{ menuItem.text }}
        </a>
      </li>
    </ul>
  </div>

  <div class="navbar-end xl:hidden">
    <div>
      <input type="checkbox" class="drawer-toggle" />
      <div class="drawer-content">
        <!-- Page content here -->
        <label class="btn btn-square btn-primary text-white swap swap-rotate shadow-sm">
          
          <!-- this hidden checkbox controls the state -->
          <input type="checkbox" [(ngModel)]="menuOpen" />
          <svg class="swap-off fill-current" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512"><path d="M64,384H448V341.33H64Zm0-106.67H448V234.67H64ZM64,128v42.67H448V128Z"/></svg>
          <svg class="swap-on fill-current" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 512 512"><polygon points="400 145.49 366.51 112 256 222.51 145.49 112 112 145.49 222.51 256 112 366.51 145.49 400 256 289.49 366.51 400 400 366.51 289.49 256 400 145.49"/></svg>
          
        </label>
      </div> 
    </div>
  </div>
</header>

<div
  class="
    menu-sidebar
    z-[80]
    fixed
    top-0
    w-full
    h-screen
    pt-20
    flex
    flex-col
    bg-base-100
    border-r
    border-base-300
  "
  ngClass="{{ menuOpen ? 'open' : 'closed' }}"
>

  <span class="text-xl font-bold py-2 px-6 uppercase text-neutral">Meny</span>

  <ul class="menu menu-sm w-full">
    <li *ngFor="let menuItem of menuItems">
      <a
        routerLink="{{ menuItem.href }}"
        class="py-4 px-6 text-lg rounded-none"
      >
      <span class="material-symbols-outlined">
        {{ menuItem.icon }}
      </span>
        {{ menuItem.text }}
      </a>
    </li>
  </ul>

</div>
